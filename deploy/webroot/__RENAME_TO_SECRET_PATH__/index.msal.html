<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>상담원용 원격 지원 (내부)</title>
  <!--
    MSAL.js 로그인 월 버전. 이 파일을 index.html 로 쓰면 M365 로그인해야
    다운로드 버튼이 보입니다. (정적 파일은 서빙되므로 약한 경계 — 강한 경계는 oauth2-proxy)
    Entra 앱에 platform "SPA" + Redirect URI = 이 페이지 URL 등록 필요 (시크릿 불필요).
  -->
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 16px/1.6 system-ui, "Segoe UI", sans-serif;
           display: grid; place-items: center; min-height: 100vh;
           background: #f4f5f7; color: #1c1e21; padding: 24px; }
    main { width: 100%; max-width: 440px; background: #fff; border-radius: 16px;
           padding: 32px; box-shadow: 0 8px 30px rgba(0,0,0,.08); }
    h1 { font-size: 1.4rem; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
    .badge { font-size: .7rem; font-weight: 700; padding: 3px 8px; border-radius: 999px;
             background: #fde68a; color: #7c4a03; }
    p { margin: 0 0 16px; color: #444; }
    button#loginBtn { width: 100%; padding: 14px; border: 0; border-radius: 10px;
                      font: inherit; font-weight: 600; color: #fff; background: #2563eb; cursor: pointer; }
    .dl { display: grid; gap: 12px; margin: 24px 0 8px; }
    .dl a { display: block; text-align: center; text-decoration: none;
            padding: 14px; border-radius: 10px; font-weight: 600; background: #0a6734; color: #fff; }
    .dl a.alt { background: #e8eaed; color: #1c1e21; }
    .note { font-size: .85rem; color: #777; margin-top: 16px; }
    .warn { font-size: .9rem; color: #b91c1c; margin-top: 12px; }
    @media (prefers-color-scheme: dark) {
      body { background: #18191a; color: #e4e6eb; }
      main { background: #242526; box-shadow: none; }
      p { color: #b0b3b8; } .dl a.alt { background: #3a3b3c; color: #e4e6eb; }
    }
  </style>
</head>
<body>
  <main>
    <h1>상담원용 원격 지원 <span class="badge">내부</span></h1>

    <section id="login">
      <p>이 페이지는 <b>내부 직원용</b>입니다. 계속하려면 회사 계정으로 로그인하세요.</p>
      <button id="loginBtn">M365 로그인</button>
      <p id="msg" class="warn"></p>
    </section>

    <section id="content" hidden>
      <p><b id="who"></b>님, 아래에서 상담원용 프로그램을 받으세요.
         실행 후 앱에서도 한 번 더 M365 로그인이 필요합니다.</p>
      <div class="dl">
        <!-- 본인이 호스팅하는 상담원용 빌드 URL로 교체 -->
        <a href="&lt;STAFF_WINDOWS_EXE_URL&gt;">Windows (상담원용) 다운로드</a>
        <a class="alt" href="&lt;STAFF_ANDROID_APK_URL&gt;">Android (상담원용) 다운로드</a>
      </div>
      <p class="note"><a href="#" id="logoutBtn">로그아웃</a> · 이 URL은 외부에 공유하지 마세요.</p>
    </section>
  </main>

  <!-- 버전은 최신으로 갱신 가능 -->
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
  <script>
    // ── 배포 시 교체 (clientId·tenant는 공개 식별자 — 시크릿 아님) ──
    const AAD_TENANT = "<AAD_TENANT>";   // 테넌트 GUID
    const AAD_CLIENT = "<AAD_CLIENT>";   // 앱(클라이언트) ID
    const ALLOWED_DOMAIN = "";           // (선택) "yourcompany.com" — 비우면 테넌트 전체 허용

    const pca = new msal.PublicClientApplication({
      auth: {
        clientId: AAD_CLIENT,
        authority: "https://login.microsoftonline.com/" + AAD_TENANT,
        redirectUri: location.href.split("#")[0].split("?")[0],
      },
      cache: { cacheLocation: "sessionStorage" },
    });

    const $ = (id) => document.getElementById(id);
    const allowed = (u) =>
      !ALLOWED_DOMAIN || (u || "").toLowerCase().endsWith("@" + ALLOWED_DOMAIN.toLowerCase());

    function reveal(account) {
      if (!allowed(account.username)) {
        $("msg").textContent = account.username + " — 이 계정은 권한이 없습니다.";
        return;
      }
      $("who").textContent = account.name || account.username;
      $("login").hidden = true;
      $("content").hidden = false;
    }

    pca.handleRedirectPromise()
      .then((res) => {
        const acc = (res && res.account) || pca.getAllAccounts()[0];
        if (acc) reveal(acc);
      })
      .catch((e) => { $("msg").textContent = "로그인 오류: " + e; });

    $("loginBtn").onclick = () => pca.loginRedirect({ scopes: ["openid", "profile"] });
    $("logoutBtn").onclick = (e) => { e.preventDefault(); pca.logoutRedirect(); };
  </script>
</body>
</html>
