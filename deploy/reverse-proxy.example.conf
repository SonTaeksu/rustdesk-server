# ── Nginx Proxy Manager — RustDesk 서버 reverse proxy 설정 (샘플) ──
#
# WSS/443 종단 + 경로 라우팅. docker-compose.example.yml 의 서비스로 프록시한다.
# 클라이언트는 /ws/id·/ws/relay 만 사용 · /authconfig/ 는 상담원 키 게이트 · / 는 다운로드 페이지(선택).
#
# [Proxy Hosts > Add Proxy Host]
#   [Details]
#     Domain Names            : <your-domain>
#     Scheme                  : http
#     Forward Hostname / Port : rustdesk-hbbs / 21118    (기본 location /; 실제 라우팅은 아래 Advanced)
#                               ※ 다운로드 페이지를 같은 도메인 / 에 두려면 rustdesk-download / 80 으로
#     Websockets Support      : ON
#     Block Common Exploits   : ON (선택)
#   [SSL]
#     본인 인증서 지정 · Force SSL = ON · HTTP/2 = ON
#   [Advanced]  ← 아래 location 블록들을 그대로 붙여넣기
#
# proxy_pass 대상 = compose 의 container_name. NPM 이 compose 네트워크
# (.env 의 COMPOSE_NETWORK, 기본 rustdesk-net)에 같이 있어야 service 이름으로 접근된다.
# (compose 가 host ports 를 발행했다면 http://<도커호스트IP>:21118 / :21119 로 교체 가능.
#  샘플 compose 는 host ports 를 닫았으므로 같은 네트워크가 유일 경로.)

proxy_read_timeout 3600s;
proxy_send_timeout 3600s;
proxy_connect_timeout 3600s;

location /ws/id {
    proxy_pass http://rustdesk-hbbs:21118;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

location /ws/relay {
    proxy_pass http://rustdesk-hbbr:21119;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

location /authconfig/ {
    proxy_pass http://rustdesk-authconfig:8000/;
    proxy_set_header Host $host;
}
